<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanapDormIndang Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('../../images/bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow-y: auto;
        }

        .overlay{
            width:100%;
            min-height:100vh;
            background:rgba(0,0,0,0.55);
            padding:20px 50px;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-top:-20px;
            padding:0 50px 8px 50px;
            border-bottom:1px solid rgba(255,255,255,0.25);
            margin-left:-50px;
            margin-right:-50px;
            position:sticky;
            top:0;
            z-index:1000;
            backdrop-filter:blur(12px);
        }

        .left-nav{
            display:flex;
            align-items:center;
            gap:5px;
        }

        .logo {
            width: 5rem;
        }

        .nav-links{
            display:flex;
            list-style:none;
            gap:14px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:13px;
            padding:7px 14px;
            border-radius:10px;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#4fdcff;
            transition:0.5s;
        }

        .signin-top{
            color:white;
            text-decoration:none;
            font-size:13px;
            padding:8px 18px;
            border-radius:12px;
            border:1px solid rgba(255,255,255,0.2);
            background:rgba(255,255,255,0.05);
            transition:0.3s;
        }

        .signin-top:hover{
            border:1px solid #00d9ff;
            box-shadow:
            0 0 10px rgba(0,217,255,0.8),
            0 0 20px rgba(0,217,255,0.5);
            color:#4fdcff;
            background:rgba(255,255,255,0.08);
        }

        .page{
            width:100%;
            min-height:calc(100vh - 90px);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .page-title{
            text-align:center;
            color:white;
            font-size:42px;
            font-weight:bold;
            line-height:1.1;
            margin-bottom:25px;
            text-shadow:0 0 10px rgba(255,255,255,0.2);
        }

        .card{
            width:340px;
            padding:30px 26px;
            border-radius:22px;
            background:rgba(20,20,20,0.35);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2);
            box-shadow:
            0 0 10px rgba(255,255,255,0.15),
            0 0 25px rgba(255,255,255,0.08);
        }

        .form-group{
            margin-bottom:16px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            color:#b8c3db;
        }

        input{
            width:100%;
            padding:12px 14px;
            border-radius:12px;
            border:2px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.06);
            color:white;
            outline:none;
            transition:0.3s;
            font-size:14px;
        }

        input::placeholder{
            color:#cccccc;
        }

        input:hover,
        input:focus{
            border-color:#00d9ff;
            box-shadow:
            0 0 8px rgba(0,217,255,0.7),
            0 0 15px rgba(0,217,255,0.4);
        }

        .role-select{
            display:flex;
            gap:12px;
            margin-top:8px;
        }

        .role-option{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:12px;
            border-radius:14px;
            border:2px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.06);
            color:white;
            cursor:pointer;
            transition:0.3s;
            font-size:14px;
        }

        .role-option input{
            width:auto;
            cursor:pointer;
        }

        .role-option:hover{
            border-color:#00d9ff;
            box-shadow:
            0 0 8px rgba(0,217,255,0.5),
            0 0 15px rgba(0,217,255,0.2);
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            background:linear-gradient(to right,#00d9ff,#ffffff);
            color:black;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
            margin-top:8px;
        }

        .btn:hover{
            transform:scale(1.03);
            box-shadow:
            0 0 10px rgba(0,217,255,0.7),
            0 0 20px rgba(255,255,255,0.4);
        }

        .extra{
            margin-top:18px;
            text-align:center;
            color:#b8c3db;
            font-size:14px;
        }

        .extra a{
            color:#4fdcff;
            text-decoration:none;
        }

        .extra a:hover{
            text-decoration:underline;
        }

        .alert{
            padding:10px 12px;
            border-radius:10px;
            margin-bottom:14px;
            font-size:13px;
            line-height:1.4;
        }

        .alert-error{
            background:rgba(255,80,80,0.15);
            border:1px solid rgba(255,100,100,0.5);
            color:#ffb3b3;
        }

    </style>
</head>

<body>

    <div class="overlay">

        <nav class="navbar">
            <div class="left-nav">
                <img src="../images/logo.png" alt="Logo" class="logo">

                <ul class="nav-links">
                    <li><a href="../homepage.html">Home</a></li>
                    <li><a href="../listings/listings.html">Listings</a></li>
                </ul>
            </div>

            <a href="login.html" class="signin-top">Sign In</a>
        </nav>

        <div class="page">
            <h1 class="page-title">
                Create Your<br>
                HanapDormIndang<br>
                Account
            </h1>

            <section class="card">
                <div id="formAlert" class="alert" style="display:none;"></div>
                <form method="POST" action="register.php">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="First name" required>
                    </div>

                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Last name" required>
                    </div>

                    <div class="form-group">
                        <label>I am a</label>

                        <div class="role-select">

                            <label class="role-option">
                                <input type="radio" name="role" value="student" required>
                                <span>Student</span>
                            </label>

                            <label class="role-option">
                                <input type="radio" name="role" value="dorm_owner" required>
                                <span>Dorm Owner</span>
                            </label>

                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="example@gmail.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Create password" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirm_password" placeholder="Repeat password" required minlength="6">
                    </div>

                    <button class="btn" type="submit">
                        Create Account
                    </button>
                </form>

                <p class="extra">
                    Already have an account?
                    <a href="login.html">Sign In</a>
                </p>
            </section>
        </div>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const error = params.get('error');
            if (!error) return;

            const alert = document.getElementById('formAlert');
            alert.style.display = 'block';
            alert.textContent = error;
            alert.classList.add('alert-error');
        })();
    </script>
</body>
</html>
