<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HanapDormCvSU | Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      background: url('../images/bg.png') no-repeat center center/cover;
      overflow:hidden;
    }

    .overlay{
      width:100%;
      height:100vh;
      background:rgba(0,0,0,0.55);
      padding:20px 50px;
    }

    .navbar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:-18px;
        padding:0 50px 8px 50px;
        border-bottom:1px solid rgba(255,255,255,0.25);
        margin-left:-50px;
        margin-right:-50px;
    }

    .left-nav{
        display:flex;
        align-items:center;
        gap:5px;
    }

    .logo {
        width: 5rem;
    }

    .nav-links{
        display:flex;
        list-style:none;
        gap:14px;
    }

    .nav-links a{
        color:white;
        text-decoration:none;
        font-size:13px;
        padding:7px 14px;
        border-radius:10px;
        transition:0.3s;
    }

    .nav-links a:hover{
        color:#4fdcff;
        transition:0.5s;
    }


    .signin-top{
        color:white;
        text-decoration:none;
        font-size:13px;
        padding:8px 18px;
        border-radius:12px;
        border:1px solid rgba(255,255,255,0.2);
        background:rgba(255,255,255,0.05);
        transition:0.3s;
    }

    .signin-top:hover{
        border:1px solid #00d9ff;
        box-shadow:
        0 0 10px rgba(0,217,255,0.8),
        0 0 20px rgba(0,217,255,0.5);
        color:#4fdcff;
        background:rgba(255,255,255,0.08);
    }


    .login-wrapper{
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        min-height:calc(100vh - 90px);
        color:white;
    }

    .login-title{
        text-align:center;
        font-size:42px;
        font-weight:bold;
        line-height:1.1;
        margin-bottom:25px;
        text-shadow:0 0 10px rgba(255,255,255,0.2);
    }

    .login-container{
        width:340px;
        padding:25px;
        border-radius:18px;
        background:rgba(20,20,20,0.35);
        backdrop-filter:blur(10px);
        border:1px solid rgba(255,255,255,0.2);
        box-shadow:
        0 0 10px rgba(255, 255, 255, 0.15),
        0 0 25px rgba(255,255,255,0.08);
    }

    .input-box{
         margin-bottom:18px;
    }

    .input-box label{
        display:block;
        margin-bottom:8px;
        font-size:14px;
        color:white;
    }

    .input-box input{
        width:100%;
        padding:12px;
        border-radius:10px;
        border:2px solid rgba(255,255,255,0.15);
        background:rgba(255,255,255,0.08);
        color:white;
        outline:none;
        transition:0.3s;
        font-size:14px;
    }

    .input-box input::placeholder{
        color:#cccccc;
    }

    .input-box input:hover,
    .input-box input:focus{
        border:2px solid #00d9ff;

        box-shadow:
        0 0 8px rgba(0,217,255,0.7),
        0 0 15px rgba(0,217,255,0.4);
    }

    .options{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
        font-size:13px;
        color:white;
    }

    .options input[type="checkbox"]{
        cursor:pointer;
    }

    .options a{
        color:#4fdcff;
        text-decoration:none;
    }

    .options a:hover{
        text-decoration:underline;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:30px;
        background:linear-gradient(to right,#00d9ff,#ffffff);
        color:black;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        transform:scale(1.03);
        box-shadow:
        0 0 10px rgba(0,217,255,0.7),
        0 0 20px rgba(255,255,255,0.4);
    }

    .register-text{
        text-align:center;
        margin-top:20px;
        font-size:14px;
        color:white;
    }

    .register-text a{
        color:#4fdcff;
        text-decoration:none;
    }

    .register-text a:hover{
        text-decoration:underline;
    }

    .alert{
        padding:10px 12px;
        border-radius:10px;
        margin-bottom:14px;
        font-size:13px;
        line-height:1.4;
    }

    .alert-error{
        background:rgba(255,80,80,0.15);
        border:1px solid rgba(255,100,100,0.5);
        color:#ffb3b3;
    }

    .alert-success{
        background:rgba(80,255,160,0.12);
        border:1px solid rgba(100,255,180,0.45);
        color:#b8ffd9;
    }

  </style>

</head>

<body>

  <div class="overlay">

    <nav class="navbar">
        <div class="left-nav">
            <img src="../images/finals-logo.png" alt="Logo" class="logo">
            <ul class="nav-links">
            <li><a href="../homepage.html">Home</a></li>
            <li><a href="../listings/listings.html">Listings</a></li>
            </ul>
        </div>
        <a href="login.html" class="signin-top">Sign In</a>
    </nav>

    <div class="login-wrapper">
        <div class="login-title">
            Login to Your<br>
            HanapDormIndang<br>
            Account
        </div>

        <div class="login-container">
            <div id="formAlert" class="alert" style="display:none;"></div>
            <form method="POST" action="login.php">
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="options">
                <label>
                <input type="checkbox" name="remember_me" value="1">
                Remember Me
                </label>
                <a href="forgot-password.html">Forgot Password?</a>
            </div>

            <button type="submit">Sign In</button>

            <p class="register-text">
                New to Hanap Dorm Indang?
                <a href="register.html">Create New Account</a>
            </p>
            </form>
        </div>
    </div>

  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const alert = document.getElementById('formAlert');
      const error = params.get('error');
      const success = params.get('success');

      if (!error && !success) return;

      alert.style.display = 'block';
      alert.textContent = error || success;
      alert.classList.add(error ? 'alert-error' : 'alert-success');
    })();
  </script>

</body>
</html>
