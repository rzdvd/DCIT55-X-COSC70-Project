<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanapDormIndang Forgot Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: url('./images/bg.png') no-repeat center center/cover;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55); 
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .title{
            text-align:center;
            color:white;
            font-size:42px;
            font-weight:bold;
            line-height:1.1;
            margin-bottom:18px;
            text-shadow:0 0 10px rgba(255,255,255,0.2);
        }

        .card{
            width:340px;
            padding:30px 26px;
            border-radius:22px;
            background:rgba(10,15,35,0.78);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.18);
            box-shadow:
            0 0 12px rgba(255,255,255,0.12),
            0 0 30px rgba(255,255,255,0.06);
        }

        .text{
            color:#b8c3db;
            font-size:14px;
            margin-bottom:18px;
            text-align:center;
            line-height:1.4;
        }

        input{
            width:100%;
            padding:12px 14px;
            border-radius:12px;
            border:2px solid rgba(255,255,255,0.15);
            background:rgba(255,255,255,0.06);
            color:white;
            outline:none;
            transition:0.3s;
            font-size:14px;
            margin-bottom:16px;
        }

        input::placeholder{
            color:#ccc;
        }

        input:hover,
        input:focus{
            border-color:#00d9ff;
            box-shadow:
            0 0 8px rgba(0,217,255,0.7),
            0 0 15px rgba(0,217,255,0.4);
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:30px;
            background:linear-gradient(to right,#00d9ff,#ffffff);
            color:black;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.03);
            box-shadow:
            0 0 10px rgba(0,217,255,0.7),
            0 0 20px rgba(255,255,255,0.4);
        }

        .back{
            text-align:center;
            margin-top:18px;
            font-size:14px;
        }

        .back a{
            color:#4fdcff;
            text-decoration:none;
        }

        .back a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

    <div class="page">

        <h1 class="title">
            Forgot Your<br>
            Password?
        </h1>

        <div class="card">
            <p class="text">
                Enter your email address and we’ll send you a link to reset your password.
            </p>

            <form>
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Send Reset Link</button>
            </form>

            <div class="back">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>

    </div>

</body>
</html>
